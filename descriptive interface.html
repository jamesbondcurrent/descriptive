<!DOCTYPE html>
<html>
<head>
<title>IBPS Realistic Descriptive Simulator</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f4f7; margin: 0; padding: 20px; }
.header { display: flex; justify-content: space-between; padding: 10px 20px; background: #003366; color: white; font-weight: bold; align-items: center; }
.container { display: flex; gap: 20px; margin-top: 20px; }
.question-panel { width: 35%; background: white; padding: 15px; border: 1px solid #ccc; height: 420px; overflow-y: auto; }
.editor-panel { width: 65%; display: flex; flex-direction: column; }
.topbar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: #003366; align-items: center; }
textarea {
    width: 600px;
    height: 220px;
    font-size: 16px;
    padding: 10px;
    border: 1px solid #ccc;
    resize: none;
    overflow: auto;
    white-space: pre;
    word-wrap: normal;
}
button { padding: 6px 12px; margin-left: 5px; background: #003366; color: white; border: none; cursor: pointer; }
button:hover { background: #0055a0; }
input[type=number] { width: 60px; padding: 4px; }
</style>
</head>
<body>

<div class="header">
    <span>IBPS Descriptive Practice Simulator</span>
    <div>
        Duration: <input type="number" id="customTime" value="30" min="1"> min
        <button onclick="stopTimer()">Stop</button>
        <span id="timerDisplay">30:00</span>
    </div>
</div>

<div class="container">
<div class="question-panel">
<h3>Questions</h3>
<p><b>Essay (150 words)</b></p>
<p>Impact of Digital Banking in India.</p>
<hr>
<p><b>Letter (150 words)</b></p>
<p>Write a letter to your bank manager requesting ATM card replacement.</p>
</div>

<div class="editor-panel">
<div class="topbar">
<span>Words: <span id="words">0</span></span>
</div>
<textarea id="editor"></textarea>
<button onclick="submitTest()">Submit</button>
</div>
</div>

<script>
const editor = document.getElementById("editor");
const wordCounter = document.getElementById("words");
const timerDisplay = document.getElementById("timerDisplay");
let timer = null;
let time = 1800;
let timerStarted = false;

// Character threshold for wrap
const WRAP_CHAR_THRESHOLD = 150;

// Word counter update
function updateWordCount() {
    wordCounter.textContent = editor.value.trim().split(/\s+/).filter(Boolean).length;
}

// Helper: get word boundaries under cursor
function getWordBoundary(text, pos) {
    let start = pos, end = pos;
    while (start > 0 && text[start - 1] !== " ") start--;
    while (end < text.length && text[end] !== " ") end++;
    return { start, end };
}

// Keydown handler
editor.addEventListener("keydown", (e) => {
    const text = editor.value;
    const pos = editor.selectionStart;

    // Start timer on first typing
    if (!timerStarted && e.key.length === 1) {
        startTimer();
        timerStarted = true;
    }

    const arrows = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"];
    if (arrows.includes(e.key)) return;

    // Prevent holding Backspace/Enter
    if ((e.key === "Backspace" || e.key === "Enter") && e.repeat) e.preventDefault();

    // Prevent multiple consecutive spaces
    if (e.key === " " && (pos === 0 || text[pos - 1] === " ")) e.preventDefault();

    // Block Ctrl shortcuts
    if (e.ctrlKey && ["c","v","x","a"].includes(e.key.toLowerCase())) e.preventDefault();

    // Prevent new words in the middle of a word
    const allowedKeys = ["Backspace", "Delete", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Enter"];
    if (!allowedKeys.includes(e.key) && e.key.length === 1 && e.key !== " ") {
        const boundary = getWordBoundary(text, pos);
        if (pos !== boundary.end) {
            e.preventDefault();
            editor.selectionStart = editor.selectionEnd = text.length;
        }
    }

    // Enter rules: allow Enter only at end of word, not after space, and block multiple Enters
    if (e.key === "Enter") {
        const boundary = getWordBoundary(text, pos);
        const prevChar = text[pos - 1] || "";
        if (pos !== boundary.end || prevChar === " " || prevChar === "\n") {
            e.preventDefault();
            editor.selectionStart = editor.selectionEnd = boundary.end;
        }
    }
});

// Handle input and auto-wrap
editor.addEventListener("input", () => {
    const lines = editor.value.split("\n");
    const lastLine = lines[lines.length - 1];

    // Auto-wrap after threshold
    if (lastLine.length > WRAP_CHAR_THRESHOLD) {
        lines.push("");
        editor.value = lines.join("\n");
        editor.selectionStart = editor.selectionEnd = editor.value.length;
    }

    updateWordCount();
});

// Always move cursor to end on mouse click
editor.addEventListener("click", () => {
    setTimeout(() => { editor.selectionStart = editor.selectionEnd = editor.value.length; }, 0);
});

// Disable paste & right-click
editor.addEventListener("paste", e => e.preventDefault());
editor.addEventListener("contextmenu", e => e.preventDefault());

// Timer functions
function updateTimer() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timerDisplay.textContent = String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
    if (time > 0) { time--; } else { clearInterval(timer); alert("Time up!"); }
}
function startTimer() {
    let mins = parseInt(document.getElementById("customTime").value);
    if (isNaN(mins) || mins < 1) mins = 30;
    time = mins * 60;
    if (timer) clearInterval(timer);
    timer = setInterval(updateTimer, 1000);
}
function stopTimer() { clearInterval(timer); }

// Submit
function submitTest() { alert("Test Submitted!"); }
</script>

</body>
</html>
